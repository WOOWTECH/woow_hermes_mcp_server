version: "3.9"

services:
  hermes-mcp-admin:
    build: .
    ports:
      - "9003:8080"
    volumes:
      - hermes-mcp-data:/data
    environment:
      MCP_ADMIN_CONFIG: /data/config.json
      HERMES_GATEWAY_URL: ${HERMES_GATEWAY_URL:-http://hermes:8642}
      HERMES_GATEWAY_API_KEY: ${HERMES_GATEWAY_API_KEY:-}
      HERMES_DASHBOARD_URL: ${HERMES_DASHBOARD_URL:-http://hermes:9119}
      HERMES_DASHBOARD_USERNAME: ${HERMES_DASHBOARD_USERNAME:-admin}
      HERMES_DASHBOARD_PASSWORD: ${HERMES_DASHBOARD_PASSWORD:-}

volumes:
  hermes-mcp-data:
